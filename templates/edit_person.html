{% extends "base.html" %}
{% block title %}Edit Person — AI-POWERED MULTI-MODAL ATTENDANCE SYSTEM{% endblock %}

{% block content %}
<div class="page-header">
  <div class="eyebrow">Enrollment</div>
  <h1>Edit Person</h1>
  <p>Update details for {{ person.person_code }}. Face data and QR code stay unchanged.</p>
</div>

<div class="panel" style="max-width: 480px;">
  <form method="POST" action="{{ url_for('edit_person', person_id=person.id) }}">
    <label>Person Code</label>
    <input type="text" value="{{ person.person_code }}" disabled
           style="opacity: 0.6; cursor: not-allowed;">

    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required value="{{ person.name }}">

    <label for="rfid_card">RFID Card Number</label>
    <input type="text" id="rfid_card" name="rfid_card"
           value="{{ person.rfid_card or '' }}" placeholder="Optional">

    <button type="submit" class="btn">Save Changes</button>
    <a href="{{ url_for('register') }}" class="btn btn-secondary" style="text-decoration:none; margin-left: 10px;">Cancel</a>
  </form>
</div>
{% endblock %}
